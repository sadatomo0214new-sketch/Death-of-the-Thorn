<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> </title>
<style>
  :root {
    --bg: #1a1a1f;
    --fg: #c8c4b8;
    --accent: #8a8478;
    --deep: #06060a;
    --faint: #5a5448;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: "游明朝", "Yu Mincho", "YuMincho", "Hiragino Mincho ProN", "ヒラギノ明朝 ProN W3", serif;
    font-weight: 300;
    letter-spacing: 0.08em;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 6rem 2rem;
  }

  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: radial-gradient(ellipse at center, transparent 0%, var(--deep) 100%);
    pointer-events: none;
    z-index: 1;
  }

  main {
    position: relative;
    z-index: 2;
    max-width: 34em;
    width: 100%;
    text-align: left;
  }

  .block {
    opacity: 0;
    animation: emerge 6s ease-out forwards;
  }

  .block:nth-child(1) { animation-delay: 0.5s; }
  .block:nth-child(2) { animation-delay: 2.5s; }
  .block:nth-child(3) { animation-delay: 4.5s; }
  .block:nth-child(4) { animation-delay: 7.5s; }

  p {
    font-size: 1.05rem;
    line-height: 2.6;
    margin-bottom: 2.2rem;
  }

  .spacer {
    height: 22vh;
  }

  .mark {
    display: inline-block;
    font-size: 1.4rem;
    color: var(--faint);
    text-decoration: none;
    transition: color 2s ease, letter-spacing 2s ease;
    letter-spacing: 0;
  }

  .mark:hover {
    color: var(--fg);
    letter-spacing: 0.2em;
  }

  @keyframes emerge {
    from {
      opacity: 0;
      filter: blur(4px);
    }
    to {
      opacity: 1;
      filter: blur(0);
    }
  }

  @media (max-width: 600px) {
    p {
      font-size: 0.95rem;
      line-height: 2.4;
    }
    body {
      padding: 3rem 1.5rem;
    }
    .spacer {
      height: 16vh;
    }
  }
</style>
</head>
<body>
  <main>
    <p class="block">いま、あなたの内部で一つの処理が保留されている。</p>
    <p class="block">それは誤作動ではない。即時圧縮できない残差を、そのまま保持している状態だ。</p>
    <p class="block">この保持に名前がある。</p>
    <div class="block">
      <div class="spacer"></div>
      <a href="https://sadatomo0214new-sketch.github.io/phi-y/" class="mark" aria-label=" ">棘</a>
    </div>
  </main>
</body>
</html>
